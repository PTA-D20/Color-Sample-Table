<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Color Sample Table</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
  body { font-family: 'Roboto', sans-serif; padding: 20px; background-color: #f8f9fa; }
  table { border-collapse: collapse; margin-top: 10px; text-align: center; font-size: 14px; background: white; }
  td, th { border: 1px solid #ccc; padding: 12px; text-align: center; min-width: 160px; position: relative; }
  .theme-controls { margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #ddd; display: flex; gap: 10px; }
  .picker { width: 30px; height: 30px; padding: 0; border: none; cursor: pointer; vertical-align: middle; }
  .hex-input, .label-input { width: 90%; padding: 6px; border: 1px solid #ccc; border-radius: 3px; text-align: center; }
  .label-input { font-weight: 700; background: #fffde7; }
  .row-label-input { background: #fffde7; font-weight: 700; width: 80px; border: 1px solid #ddd; margin-bottom: 5px; }
  .btn-del { position: absolute; top: 2px; right: 2px; background: #ff4d4f; color: white; border: none; border-radius: 3px; width: 18px; height: 18px; cursor: pointer; opacity: 0.4; }
  .btn-del:hover { opacity: 1; }
  .header-label-cell { font-weight: 700; background: #fffde7 !important; }
  textarea { width: 100%; height: 180px; margin-top: 15px; font-family: monospace; background: #222; color: #7fdbff; padding: 10px; box-sizing: border-box; }
  button { padding: 8px 15px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; font-weight: 500; }
  .btn-gen { background: #27ae60; color: white; border: none; }
  .btn-add { background: #3498db; color: white; border: none; }
  .row-theme-box { font-size: 11px; border-top: 1px solid #eee; margin-top: 5px; padding-top: 5px; color: #666; }
</style>
</head>
<body>

<div class="theme-controls">
  <strong>QUẢN TRỊ:</strong>
  <button class="btn-add" onclick="addRow()">➕ Thêm hàng</button>
  <button class="btn-add" onclick="addColumn()">➕ Thêm cột</button> 
  <button class="btn-gen" onclick="generate()">Generate Snapshot</button>
</div>

<table id="tbl">
  <tr id="row-labels">
      <th class="header-label-cell" style="min-width: 100px;"></th>
  </tr>
</table>

<textarea id="output" placeholder="Mã HTML snapshot..."></textarea>

<script>
let rowCount = 0;

function getRgba(hex, alpha) {
    if (!/^#[0-9A-F]{6}$/i.test(hex)) return `rgba(0,0,0,${alpha})`;
    const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function addColumn() {
    const rows = document.getElementById("tbl").rows;
    const th = document.createElement("td");
    th.className = "header-label-cell";
    th.innerHTML = `<input type="text" class="label-input" value="Label" oninput="render()"><button class="btn-del" onclick="deleteColumn(this)">✕</button>`;
    rows[0].appendChild(th);
    
    for (let i = 1; i < rows.length; i++) {
        if (rows[i].classList.contains('input-row')) {
            rows[i].appendChild(createInputCell("#888888"));
        }
    }
    render();
}

function addRow(name = "NEW ROW", themeHex = "#2d2d2d", themeAlpha = "0.9") {
    const table = document.getElementById("tbl");
    const colCount = table.rows[0].cells.length - 1;
    const rId = 'row-grp-' + rowCount++;
    
    const rowInput = table.insertRow(-1);
    rowInput.id = rId + '-input';
    rowInput.className = 'input-row';
    
    const headCell = document.createElement("td");
    headCell.rowSpan = 2;
    headCell.className = 'header-label-cell';
    headCell.innerHTML = `
        <input type="text" class="row-label-input" value="${name}" oninput="render()">
        <div class="row-theme-box">
            Theme:<br>
            <div style="display:flex; align-items:center; gap:4px; margin-bottom:4px; justify-content:center;">
                <input type="color" class="row-theme-picker picker" value="${themeHex}" oninput="render()">
                <input type="text" class="row-theme-hex" style="width:60px; font-size:10px; text-align:center;" value="${themeHex}" oninput="render()">
            </div>
            Alpha: <input type="number" class="row-theme-alpha" style="width:40px" step="0.1" min="0" max="1" value="${themeAlpha}" oninput="render()">
        </div>
        <button class="btn-del" onclick="deleteRow('${rId}')">✕</button>
    `;
    rowInput.appendChild(headCell);

    const rowRender = table.insertRow(-1);
    rowRender.id = rId + '-render';
    rowRender.className = 'render-row';

    for (let i = 0; i < colCount; i++) {
        rowInput.appendChild(createInputCell("#888888"));
    }
    render();
}

function createInputCell(color) {
    const td = document.createElement("td");
    td.innerHTML = `
      <div style="display:flex; flex-direction:column; align-items:center; gap:5px;">
        <div style="display:flex; align-items:center; gap:5px;">
          <input type="color" class="picker" value="${color}" oninput="render()">
          <input type="text" class="hex-input" style="width:65px; font-size:11px;" value="${color}" oninput="render()">
        </div>
        <label style="font-size:11px"><input type="checkbox" class="is-special" onchange="render()"> Hidden</label>
      </div>`;
    return td;
}

function deleteColumn(btn) {
    const cell = btn.parentElement;
    const index = cell.cellIndex;
    const table = document.getElementById("tbl");
    
    for (let i = 0; i < table.rows.length; i++) {
        const row = table.rows[i];
        if (row.id === 'row-labels' || row.classList.contains('input-row')) {
            row.deleteCell(index);
        } else if (row.classList.contains('render-row')) {
            if (index > 0) row.deleteCell(index - 1);
        }
    }
    render();
}

function deleteRow(rId) {
    document.getElementById(rId + '-input').remove();
    document.getElementById(rId + '-render').remove();
    render();
}

function render() {
    document.querySelectorAll('.input-row').forEach(inRow => {
        const themePicker = inRow.querySelector('.row-theme-picker');
        const themeHexInput = inRow.querySelector('.row-theme-hex');
        const themeAlpha = inRow.querySelector('.row-theme-alpha').value;

        // Đồng bộ Theme Picker và Theme Hex Input
        if(document.activeElement === themePicker) themeHexInput.value = themePicker.value.toUpperCase();
        if(document.activeElement === themeHexInput) {
            if(/^#[0-9A-F]{6}$/i.test(themeHexInput.value)) themePicker.value = themeHexInput.value;
        }
        
        const currentTheme = getRgba(themeHexInput.value, themeAlpha);
        const renderRow = inRow.nextElementSibling;
        const inputCells = inRow.querySelectorAll('td:not(.header-label-cell)');
        renderRow.innerHTML = "";
        
        inputCells.forEach(cell => {
            const hexInput = cell.querySelector('.hex-input');
            const picker = cell.querySelector('.picker');
            
            if(document.activeElement === picker) hexInput.value = picker.value.toUpperCase();
            if(document.activeElement === hexInput) {
                if(/^#[0-9A-F]{6}$/i.test(hexInput.value)) picker.value = hexInput.value;
            }

            const isSpec = cell.querySelector('.is-special').checked;
            const td = document.createElement("td");
            if (!isSpec) {
                td.style.background = currentTheme;
                td.style.color = hexInput.value;
                td.style.fontWeight = "700";
                td.innerHTML = `Sample`;
            } else {
                td.style.background = "#eee";
                td.style.color = "#999";
                td.innerHTML = "N/A";
            }
            renderRow.appendChild(td);
        });
    });
}

function generate() {
    const labelValues = document.querySelectorAll("#row-labels .label-input");
    let html = `<table style="border-collapse:collapse; text-align:center; font-family:'Roboto',sans-serif; background:white;">\n`;

    html += `  <tr><td style="border:1px solid #ccc; padding:10px; background:#fffde7; min-width:100px;"></td>`;
    labelValues.forEach(l => html += `<td style="border:1px solid #ccc; padding:10px; font-weight:700; background:#fffde7; min-width:150px;">${l.value}</td>`);
    html += `</tr>\n`;

    document.querySelectorAll('.input-row').forEach(inRow => {
        const title = inRow.querySelector('.row-label-input').value;
        const tHex = inRow.querySelector('.row-theme-hex').value;
        const tAlpha = inRow.querySelector('.row-theme-alpha').value;
        const currentTheme = getRgba(tHex, tAlpha);
        const colorCells = inRow.querySelectorAll('td:not(.header-label-cell)');

        html += `  <tr><td rowspan="2" style="border:1px solid #ccc; padding:10px; background:#fffde7; font-size:12px;">`;
        html += `<strong>${title}</strong><br><span style="font-size:9px; color:#666; font-family:monospace;">${currentTheme}</span></td>`;
        
        colorCells.forEach(cell => {
            const hex = cell.querySelector('.hex-input').value;
            if(cell.querySelector('.is-special').checked) {
                html += `<td rowspan="2" style="border:1px solid #ccc; background:#f0f0f0; color:#999; font-size:11px;">HIDDEN</td>`;
            } else {
                html += `<td style="border:1px solid #ccc; padding:5px; font-size:11px; font-family:monospace; background:#fafafa;">${hex.toUpperCase()}</td>`;
            }
        });
        html += `</tr>\n  <tr>`;

        colorCells.forEach(cell => {
            if(!cell.querySelector('.is-special').checked) {
                const hex = cell.querySelector('.hex-input').value;
                html += `<td style="border:1px solid #ccc; padding:15px; background:${currentTheme}; color:${hex}; font-weight:700;">Sample</td>`;
            }
        });
        html += `</tr>\n`;
    });

    html += `</table>`;
    document.getElementById("output").value = html;
}

addColumn();
addColumn();
addRow("FAILED", "#1a1a1a", "0.8");
addRow("SUCCESS", "#1a1a1a", "0.8");
</script>
</body>
</html>
